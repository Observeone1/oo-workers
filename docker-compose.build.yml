# oo-workers — self-host stack.
# Three services: worker (this app) + postgres + redis.
# First boot runs migrations automatically.

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oo}
      POSTGRES_DB: ${POSTGRES_DB:-oo_workers}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oo} -d ${POSTGRES_DB:-oo_workers}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    # No host port publish by default — worker talks via compose network.
    # Uncomment to expose for local debugging:
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-oo}:${POSTGRES_PASSWORD:-oo}@postgres:5432/${POSTGRES_DB:-oo_workers}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_CHECK_CONCURRENCY: ${API_CHECK_CONCURRENCY:-10}
      URL_MONITOR_CONCURRENCY: ${URL_MONITOR_CONCURRENCY:-20}
      QA_PROJECT_CONCURRENCY: ${QA_PROJECT_CONCURRENCY:-5}
    # Run migrations once, then start the worker + scheduler. No HTTP server here.
    command: ['sh', '-c', 'bun src/db/migrate.ts && bun src/index.ts']

  ui:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        # wait for worker (which runs migrations) so schema exists before UI hits the DB
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-oo}:${POSTGRES_PASSWORD:-oo}@postgres:5432/${POSTGRES_DB:-oo_workers}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OO_AUTH_ENABLED: ${OO_AUTH_ENABLED:-true}
    ports:
      - '${OO_BIND_ADDR:-127.0.0.1}:${UI_PORT:-3001}:3001'
    command: ['bun', 'src/ui-server.ts']

volumes:
  postgres_data:
  redis_data:
