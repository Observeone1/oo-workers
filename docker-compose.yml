# oo-workers — self-host stack (published image variant).
# Pulls the pre-built image from Docker Hub (observeone/oo-workers). For local
# development (build from source) use docker-compose.build.yml instead.

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oo}
      POSTGRES_DB: ${POSTGRES_DB:-oo_workers}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-oo} -d ${POSTGRES_DB:-oo_workers}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    image: observeone/oo-workers:${OO_WORKERS_TAG:-0.2.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-oo}:${POSTGRES_PASSWORD:-oo}@postgres:5432/${POSTGRES_DB:-oo_workers}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_CHECK_CONCURRENCY: ${API_CHECK_CONCURRENCY:-10}
      URL_MONITOR_CONCURRENCY: ${URL_MONITOR_CONCURRENCY:-20}
      QA_PROJECT_CONCURRENCY: ${QA_PROJECT_CONCURRENCY:-5}
    command: ['sh', '-c', 'bun src/db/migrate.ts && bun src/index.ts']

  ui:
    image: observeone/oo-workers:${OO_WORKERS_TAG:-0.2.0}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-oo}:${POSTGRES_PASSWORD:-oo}@postgres:5432/${POSTGRES_DB:-oo_workers}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Flip to 'true' to gate write endpoints behind /api/auth.
      # See README "Security & deployment" for first-key bootstrap.
      OO_AUTH_ENABLED: ${OO_AUTH_ENABLED:-false}
    ports:
      # Bind to loopback by default — public exposure is explicit opt-in via
      # OO_BIND_ADDR=0.0.0.0. Pair with a TLS reverse proxy for internet exposure.
      - '${OO_BIND_ADDR:-127.0.0.1}:${UI_PORT:-3001}:3001'
    command: ['bun', 'src/ui-server.ts']

volumes:
  postgres_data:
  redis_data:
