sonar.projectKey=oo-workers
sonar.projectName=oo-workers
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage*/**,**/.claude/**,**/playwright-report/**,**/test-results/**
# Both suites feed coverage: unit (bun test src/) and integration
# (testcontainers). In CI the lcov files arrive as artifacts from the
# unit/integration jobs; locally run `bun run test:coverage` and
# `bun run test:integration:coverage` before a scan.
sonar.javascript.lcov.reportPaths=coverage-unit/lcov.info,coverage-it/lcov.info

# Coverage-denominator exclusions. Each entry is code that bun-side tests
# cannot meaningfully execute — no real logic is excluded to inflate the number:
#   **/*.spec.ts     — test code itself (unit specs live next to src files)
#   src/ui/**        — browser dashboard client (DOM-only); exercised by the
#                      Playwright UI e2e suites, which don't emit lcov
#   src/index.ts     — process entrypoint: env-role branching + signal wiring
#   src/ui-server.ts — process entrypoint for the ui role (same shape)
sonar.coverage.exclusions=tests/**,scripts/**,examples/**,docs/**,roadmaps/**,migrations/**,public/**,**/*.config.*,**/*.spec.ts,src/ui/**,src/index.ts,src/ui-server.ts
