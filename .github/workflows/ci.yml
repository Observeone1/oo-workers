name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: # manual integration run

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint

  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run knip

  integration:
    # Runs on push to main, on version tags, and manual dispatch.
    # Skipped on PR builds — fast feedback loop. Run manually via
    # the Actions tab "Run workflow" button before merging anything risky.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: oo
          POSTGRES_PASSWORD: oo
          POSTGRES_DB: oo_workers
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U oo -d oo_workers"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:8-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://oo:oo@localhost:5432/oo_workers
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run migrations
        run: bun src/db/migrate.ts

      - name: Start worker (background)
        run: bun src/index.ts &
        env:
          LOG_LEVEL: info

      - name: Wait for worker to be ready
        run: sleep 3

      - name: Smoke test
        run: bun scripts/smoke.ts

      - name: Scheduler test
        run: bun scripts/scheduler-test.ts

      - name: Load test
        run: bun scripts/load.ts

  publish:
    runs-on: ubuntu-latest
    needs: [typecheck, format-check, lint, knip]
    # Only publish on version-tag pushes — metadata-action's semver tags are
    # empty otherwise, and buildx would fail with "tag is needed when pushing
    # to registry". Plain main pushes get the green tick from the fast jobs.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: observeone/oo-workers
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build (and push on push events)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
